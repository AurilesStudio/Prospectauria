services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
  
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

  scraper:
    build: ./scraper
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
